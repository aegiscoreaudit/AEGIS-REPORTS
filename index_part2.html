// === UTILS ===
function formatDate(isoStr) {
    if (!isoStr) return '—';
    const d = new Date(isoStr);
    const pad = n => String(n).padStart(2, '0');
    return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function formatDateShort(isoStr) {
    if (!isoStr) return '—';
    const d = new Date(isoStr);
    const pad = n => String(n).padStart(2, '0');
    return `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()}`;
}

function formatSize(kb) {
    if (kb < 1024) return `${kb} KB`;
    return `${(kb/1024).toFixed(1)} MB`;
}

function getFaviconUrl(domain) {
    return `https://www.google.com/s2/favicons?domain=${domain}&sz=32`;
}

function getTotalVulns(client) {
    const v = client.total_vulns || {};
    return (v.critical||0) + (v.high||0) + (v.medium||0) + (v.low||0);
}

function getTariffs(client) {
    return [...new Set(client.reports.map(r => r.tariff))];
}

function showToast(message, type = 'info') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icons = { success: '✓', error: '✕', info: 'ℹ' };
    toast.innerHTML = `<span>${icons[type] || 'ℹ'}</span><span>${message}</span>`;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(120%)';
        toast.style.transition = 'all 0.3s';
        setTimeout(() => toast.remove(), 300);
    }, 3500);
}

// === DATA LOADING ===
async function loadData() {
    try {
        const response = await fetch('clients.json', { cache: 'no-cache' });
        if (!response.ok) throw new Error('clients.json not found');
        clientsData = await response.json();
        if (!Array.isArray(clientsData)) throw new Error('Invalid data format');
        showToast(`Загружено ${clientsData.length} доменов`, 'success');
    } catch (e) {
        console.warn('Using demo data:', e.message);
        clientsData = DEMO_DATA;
        showToast('Демо-режим: clients.json не найден', 'info');
    }
    applyFilters();
    updateStats();
}

// === STATS ===
function updateStats() {
    const totalDomains = clientsData.length;
    const totalReports = clientsData.reduce((sum, c) => sum + c.reports.length, 0);
    const totalCritical = clientsData.reduce((sum, c) => sum + (c.total_vulns?.critical || 0), 0);
    
    const lastScans = clientsData.map(c => new Date(c.last_scan)).filter(d => !isNaN(d));
    const lastScan = lastScans.length ? new Date(Math.max(...lastScans)) : null;
    
    document.getElementById('statDomains').textContent = totalDomains;
    document.getElementById('statReports').textContent = totalReports;
    document.getElementById('statCritical').textContent = totalCritical;
    document.getElementById('statLastScan').textContent = lastScan ? formatDateShort(lastScan.toISOString()) : '—';
    document.getElementById('totalDomains').textContent = totalDomains;
    document.getElementById('totalReports').textContent = totalReports;
}

// === FILTERING & SORTING ===
function applyFilters() {
    filteredData = clientsData.filter(client => {
        if (searchQuery && !client.domain.toLowerCase().includes(searchQuery.toLowerCase())) {
            return false;
        }
        const clientTariffs = getTariffs(client);
        if (!clientTariffs.some(t => activeTariffs.has(t))) {
            return false;
        }
        return true;
    });
    
    filteredData.sort((a, b) => {
        switch (currentSort) {
            case 'date-desc': return new Date(b.last_scan) - new Date(a.last_scan);
            case 'date-asc': return new Date(a.last_scan) - new Date(b.last_scan);
            case 'name-asc': return a.domain.localeCompare(b.domain, 'ru');
            case 'name-desc': return b.domain.localeCompare(a.domain, 'ru');
            case 'vulns-desc': return getTotalVulns(b) - getTotalVulns(a);
            default: return 0;
        }
    });
    
    renderTable();
}

        `;
