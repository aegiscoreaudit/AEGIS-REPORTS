<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEGIS CORE — Клиентские отчёты</title>
<style>
:root { --bg: #0A0C10; --card: #11141A; --border: rgba(255,255,255,0.06); --accent: #00D4FF; --green: #10B981; --text: #EAECEF; --muted: #8B949E; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; padding: 20px; }
.container { max-width: 900px; margin: 0 auto; }
h1 { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
.subtitle { font-size: 0.8rem; color: var(--muted); margin-bottom: 24px; }
.client-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 12px; }
.client-name { font-weight: 600; font-size: 0.95rem; margin-bottom: 8px; }
.report-links { display: flex; gap: 8px; flex-wrap: wrap; }
.report-link { padding: 6px 14px; border-radius: 4px; text-decoration: none; font-size: 0.78rem; font-weight: 500; }
.report-link.start { background: rgba(107,114,128,0.15); color: #6B7280; }
.report-link.verify { background: rgba(0,240,255,0.12); color: #00F0FF; }
.report-link.comply { background: rgba(0,230,118,0.12); color: #10B981; }
.report-link.deep { background: rgba(239,68,68,0.12); color: #EF4444; }
.empty { text-align: center; color: var(--muted); padding: 40px; }
.footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border); font-size: 0.7rem; color: var(--muted); text-align: center; }
</style>
</head>
<body>
<div class="container">
    <h1>🛡 AEGIS CORE</h1>
    <div class="subtitle">Клиентские отчёты аудита безопасности</div>
    <div id="clients"></div>
    <div class="footer">AEGIS CORE v8.4 · Автоматический аудит безопасности · 152-ФЗ</div>
</div>
<script>
async function loadClients() {
    try {
        const resp = await fetch('clients.json?v=' + Date.now());
        const clients = await resp.json();
        renderClients(clients);
    } catch(e) {
        document.getElementById('clients').innerHTML = '<div class="empty">⚠️ Не удалось загрузить clients.json</div>';
    }
}

function renderClients(clients) {
    const container = document.getElementById('clients');
    if (!clients.length) {
        container.innerHTML = '<div class="empty">Нет клиентских отчётов</div>';
        return;
    }
    
    container.innerHTML = clients.map(c => {
        const reports = c.reports.map(r => {
            const cls = r.tariff.toLowerCase();
            return `<a href="${c.folder}/${r.file}" class="report-link ${cls}">${r.tariff}</a>`;
        }).join('');
        return `<div class="client-card">
            <div class="client-name">🌐 ${c.domain}</div>
            <div class="report-links">${reports}</div>
        </div>`;
    }).join('');
}

loadClients();
</script>
</body>
</html>
